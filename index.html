<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>โปรไฟล์ - ทรงพล สมตน</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #f4f7f6;
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .profile-card {
            background: #ffffff;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 450px;
            padding: 30px;
            text-align: center;
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .profile-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.15);
        }

        .avatar-container {
            width: 150px;
            height: 150px;
            margin: 0 auto 20px;
            border-radius: 50%;
            border: 4px solid #007bff;
            overflow: hidden;
            background-color: #e9ecef;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .avatar-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .avatar-placeholder {
            font-size: 50px;
            color: #adb5bd;
        }

        h1 {
            font-size: 24px;
            color: #2c3e50;
            margin-bottom: 5px;
        }

        .nickname {
            font-size: 16px;
            color: #007bff;
            font-weight: 600;
            margin-bottom: 25px;
        }

        .info-section {
            border-top: 1px solid #eee;
            padding-top: 20px;
        }

        .info-item {
            display: flex;
            align-items: flex-start;
            margin-bottom: 14px;
            font-size: 15px;
            line-height: 1.5;
            text-align: left;
        }

        .info-label {
            font-weight: bold;
            color: #7f8c8d;
            width: 110px;
            flex-shrink: 0;
        }

        .info-value {
            color: #34495e;
            flex-grow: 1;
            word-break: break-word;
        }

        .tag {
            display: inline-block;
            background-color: #e3f2fd;
            color: #0d47a1;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 13px;
            font-weight: bold;
        }

        .info-value a {
            color: inherit;
            text-decoration: none;
            transition: color 0.2s;
        }

        .info-value a:hover {
            color: #007bff;
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div class="profile-card">
        <div class="avatar-container">
            <!-- ผมปรับปรุงโค้ดให้ดึงไฟล์รูปภาพชื่อ profile.jpg ที่อยู่ในโฟลเดอร์เดียวกันแทนเพื่อความเสถียรครับ -->
            <!-- อย่าลืมอัปโหลดรูปภาพชื่อ profile.jpg (เป็นตัวพิมพ์เล็กทั้งหมด) ขึ้น GitHub คู่กับไฟล์โค้ดนี้นะครับ -->
            <img src="profile.jpg" alt="รูปโปรไฟล์ของ เจ๊ก" onerror="this.style.display='none'; document.getElementById('placeholder').style.display='block';">
            <div id="placeholder" class="avatar-placeholder" style="display: none;">👤</div>
        </div>

        <h1>นายทรงพล สมตน</h1>
        <div class="nickname">ชื่อเล่น: เจ๊ก</div>

        <div class="info-section">
            <div class="info-item">
                <span class="info-label">รหัสนักศึกษา:</span>
                <span class="info-value"><span class="tag">694245004</span></span>
            </div>
            <div class="info-item">
                <span class="info-label">สาขาวิชา:</span>
                <span class="info-value">วิทยาการคอมพิวเตอร์</span>
            </div>
            <div class="info-item">
                <span class="info-label">คณะ:</span>
                <span class="info-value">วิทยาศาสตร์และเทคโนโลยี</span>
            </div>
            <div class="info-item">
                <span class="info-label">สถาบัน:</span>
                <span class="info-value">มหาวิทยาลัยราชภัฏหมู่บ้านจอมบึง</span>
            </div>
            <div class="info-item">
                <span class="info-label">เบอร์โทร:</span>
                <span class="info-value"><a href="tel:0838594209">083-8594209</a></span>
            </div>
            <div class="info-item">
                <span class="info-label">อีเมล:</span>
                <span class="info-value"><a href="mailto:smtnthrngphl@gmail.com" style="color: #007bff;">smtnthrngphl@gmail.com</a></span>
            </div>
        </div>
    </div>

</body>
</html>
