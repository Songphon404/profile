<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>โปรไฟล์ - นาย ทรงพล สมตน</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif, 'Helvetica Neue', Arial, sans-serif;
        }

        body {
            background-color: #f0f4f8;
            color: #2d3748;
            line-height: 1.6;
            padding: 40px 20px;
        }

        .container {
            max-width: 650px;
            margin: 0 auto;
            background: #ffffff;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
        }

        /* Header Section */
        .header {
            text-align: center;
            border-bottom: 2px solid #edf2f7;
            padding-bottom: 30px;
            margin-bottom: 30px;
        }

        .profile-img {
            width: 160px;
            height: 160px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid #4a90e2;
            margin-bottom: 20px;
            box-shadow: 0 4px 10px rgba(74, 144, 226, 0.2);
        }

        .header h1 {
            font-size: 2.2rem;
            color: #1a202c;
            margin-bottom: 8px;
        }

        .nickname {
            font-size: 1.2rem;
            color: #4a90e2;
            font-weight: 600;
            margin-bottom: 15px;
        }

        .student-id {
            display: inline-block;
            background: #e1effe;
            color: #1a56db;
            padding: 6px 16px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 1.05rem;
            letter-spacing: 0.5px;
        }

        /* Section Style */
        h2 {
            color: #2d3748;
            font-size: 1.3rem;
            margin-bottom: 15px;
            border-left: 4px solid #4a90e2;
            padding-left: 12px;
        }

        .section {
            margin-bottom: 30px;
        }

        /* Info List */
        .info-list {
            list-style: none;
            background: #f8fafc;
            padding: 20px;
            border-radius: 12px;
            border: 1px solid #e2e8f0;
        }

        .info-list li {
            margin-bottom: 12px;
            font-size: 1.05rem;
            display: flex;
            align-items: center;
        }

        .info-list li:last-child {
            margin-bottom: 0;
        }

        .info-list strong {
            color: #4a5568;
            min-width: 110px;
            display: inline-block;
        }

        /* Responsive Design */
        @media (max-width: 600px) {
            body {
                padding: 15px 10px;
            }
            .container {
                padding: 25px 20px;
            }
            .header h1 {
                font-size: 1.8rem;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        
        <!-- ส่วนหัว / รูปและชื่อ -->
        <header class="header">
            <!-- 💡 เปลี่ยนชื่อไฟล์รูปภาพของคุณในช่อง src ได้ที่นี่ เช่น src="photo.jpg" -->
            <img src="https://images.unsplash.com/photo-1535713875002-d1d0cf377fde?w=500" alt="รูปโปรไฟล์" class="profile-img">
            <h1>นาย ทรงพล สมตน</h1>
            <div class="nickname">ชื่อเล่น: เจ๊ก</div>
            <div class="student-id">รหัสนักศึกษา: 694245004</div>
        </header>

        <!-- ส่วนข้อมูลการศึกษา -->
        <section class="section">
            <h2>การศึกษา (Education)</h2>
            <ul class="info-list">
                <li><strong>สาขาวิชา:</strong> วิทยาการคอมพิวเตอร์</li>
                <li><strong>คณะ:</strong> วิทยาศาสตร์และเทคโนโลยี</li>
                <li><strong>มหาวิทยาลัย:</strong> มหาวิทยาลัยราชภัฏหมู่บ้านจอมบึง</li>
            </ul>
        </section>

        <!-- ส่วนข้อมูลติดต่อ -->
        <section class="section">
            <h2>ช่องทางการติดต่อ (Contact)</h2>
            <ul class="info-list">
                <li><strong>📞 เบอร์โทรศัพท์:</strong> 082-391-4334</li>
                <li><strong>📧 อีเมล:</strong> smtnthrngphl@gmail.com</li>
            </ul>
        </section>

    </div>

</body>
</html>
