<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>โปรไฟล์ - นาย ทรงพล สมตน</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #f4f7f6;
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .profile-card {
            background: #ffffff;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 450px;
            overflow: hidden;
            text-align: center;
            padding: 30px 20px;
        }

        .profile-img-container {
            width: 160px;
            height: 160px;
            margin: 0 auto 20px;
            border-radius: 50%;
            border: 4px solid #007bff;
            overflow: hidden;
            background-color: #e9ecef;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .profile-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center 10%; 
        }

        .profile-img-placeholder {
            color: #6c757d;
            font-size: 14px;
        }

        .nickname {
            font-size: 1.2rem;
            color: #007bff;
            font-weight: 600;
            margin-bottom: 5px;
        }

        .full-name {
            font-size: 1.6rem;
            font-weight: bold;
            color: #2c3e50;
            margin-bottom: 10px;
        }

        .student-id {
            display: inline-block;
            background-color: #e7f1ff;
            color: #0056b3;
            padding: 5px 15px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 0.95rem;
            margin-bottom: 25px;
        }

        .info-section {
            text-align: left;
            border-top: 1px solid #eee;
            padding-top: 20px;
        }

        .info-group {
            margin-bottom: 15px;
        }

        .info-label {
            font-size: 0.85rem;
            color: #888;
            text-transform: uppercase;
            margin-bottom: 2px;
        }

        .info-value {
            font-size: 1.05rem;
            color: #333;
            font-weight: 500;
        }

        .info-value a {
            color: #007bff;
            text-decoration: none;
        }

        .info-value a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div class="profile-card">
        <div class="profile-img-container">
            <img src="MEITU_20251003_221104597.jpg" alt="รูปโปรไฟล์ นาย ทรงพล สมตน" class="profile-img" onerror="this.style.display='none'; this.nextElementSibling.style.display='block';">
            <div class="profile-img-placeholder" style="display: none;">ไม่มีรูปโปรไฟล์</div>
        </div>

        <div class="nickname">ชื่อเล่น: เจ๊ก</div>
        <div class="full-name">นาย ทรงพล สมตน</div>
        <div class="student-id">รหัสนักศึกษา: 694245004</div>

        <div class="info-section">
            <div class="info-group">
                <div class="info-label">สาขาวิชา</div>
                <div class="info-value">วิทยาการคอมพิวเตอร์</div>
            </div>

            <div class="info-group">
                <div class="info-label">คณะ</div>
                <div class="info-value">คณะวิทยาศาสตร์และเทคโนโลยี</div>
            </div>

            <div class="info-group">
                <div class="info-label">มหาวิทยาลัย</div>
                <div class="info-value">มหาวิทยาลัยราชภัฏหมู่บ้านจอมบึง</div>
            </div>

            <div class="info-group">
                <div class="info-label">เบอร์โทรศัพท์</div>
                <div class="info-value"><a href="tel:0823914334">082-3914334</a></div>
            </div>

            <div class="info-group">
                <div class="info-label">อีเมล</div>
                <div class="info-value"><a href="mailto:smtnthrngphl@gmail.com">smtnthrngphl@gmail.com</a></div>
            </div>
        </div>
    </div>

</body>
</html>
