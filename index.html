<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>โปรไฟล์ - นายทรงพล สมตน</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #f4f7f6;
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .profile-card {
            background: #ffffff;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 450px;
            overflow: hidden;
            text-align: center;
            transition: transform 0.3s;
        }

        .profile-card:hover {
            transform: translateY(-5px);
        }

        .header-bg {
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            height: 120px;
        }

        .avatar-container {
            margin-top: -65px;
            margin-bottom: 15px;
        }

        .profile-img {
            width: 130px;
            height: 130px;
            border-radius: 50%;
            border: 5px solid #ffffff;
            object-fit: cover;
            background-color: #e0e0e0;
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
        }

        .profile-info {
            padding: 0 30px 30px 30px;
        }

        .name {
            font-size: 24px;
            font-weight: bold;
            color: #1e3c72;
            margin-bottom: 5px;
        }

        .nickname {
            font-size: 16px;
            color: #666;
            margin-bottom: 15px;
            font-weight: normal;
        }

        .student-id {
            display: inline-block;
            background-color: #e8f0fe;
            color: #1a73e8;
            padding: 6px 15px;
            border-radius: 20px;
            font-weight: 600;
            font-size: 14px;
            margin-bottom: 25px;
        }

        .details-section {
            text-align: left;
            border-top: 1px solid #eee;
            padding-top: 20px;
        }

        .detail-item {
            margin-bottom: 15px;
            display: flex;
            flex-direction: column;
        }

        .detail-label {
            font-size: 12px;
            text-transform: uppercase;
            color: #888;
            margin-bottom: 2px;
            font-weight: 600;
        }

        .detail-value {
            font-size: 15px;
            color: #333;
            font-weight: 500;
        }

        .detail-value a {
            color: #1a73e8;
            text-decoration: none;
        }

        .detail-value a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div class="profile-card">
        <div class="header-bg"></div>
        
        <div class="avatar-container">
            <img class="profile-img" src="https://cdn.discordapp.com/attachments/1517127889655431190/1517191139512418484/MEITU_20251003_221104597.jpg?ex=6a3561db&is=6a34105b&hm=2fd856ffc97226b586b79bd60122bd7bc9a4e33781bcb2e10c714cc3d6c3f5f2&" alt="รูปโปรไฟล์ของคุณเจ๊ก" onerror="this.src='https://via.placeholder.com/150?text=No+Image'">
        </div>

        <div class="profile-info">
            <h1 class="name">นายทรงพล สมตน</h1>
            <p class="nickname">ชื่อเล่น: เจ๊ก</p>
            <div class="student-id">รหัสนักศึกษา: 694245004</div>

            <div class="details-section">
                <div class="detail-item">
                    <span class="detail-label">สาขาวิชา</span>
                    <span class="detail-value">วิทยาการคอมพิวเตอร์</span>
                </div>
                <div class="detail-item">
                    <span class="detail-label">คณะ</span>
                    <span class="detail-value">คณะวิทยาศาสตร์และเทคโนโลยี</span>
                </div>
                <div class="detail-item">
                    <span class="detail-label">มหาวิทยาลัย</span>
                    <span class="detail-value">มหาวิทยาลัยราชภัฏหมู่บ้านจอมบึง</span>
                </div>
                <div class="detail-item">
                    <span class="detail-label">เบอร์โทรศัพท์</span>
                    <span class="detail-value"><a href="tel:0838594209">083-859-4209</a></span>
                </div>
                <div class="detail-item">
                    <span class="detail-label">อีเมล</span>
                    <span class="detail-value"><a href="mailto:smtnthrngphl@gmail.com">smtnthrngphl@gmail.com</a></span>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
